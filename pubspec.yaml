name: suits

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter_screenutil: ^5.9.3
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.1
  lottie: ^3.3.2
  pin_code_fields: ^8.0.1
  circular_countdown_timer: ^0.2.4

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter.ttf

    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat.ttf

    - family: Arial
      fonts:
        - asset: assets/fonts/arial.ttf

    - family: Waterfall
      fonts:
        - asset: assets/fonts/waterfall.ttf



flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"